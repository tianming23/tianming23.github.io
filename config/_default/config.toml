# 部署前请改成你的站点地址（仓库名为 username.github.io 时用根路径）
baseurl      = "https://tianming23.github.io/"
languageCode = "zh-cn"
title        = "我的博客"

# 主题多语言：可选 en, zh-cn 等
defaultContentLanguage = "zh-cn"

# 使用中文/日文/韩文时设为 true，摘要和字数统计才正确
hasCJKLanguage = true

# 若使用 Disqus 评论，填你的 shortname；不用可留空或删掉
disqusShortname = ""

[pagination]
    pagerSize = 5
